services:
  - type: web
    name: walletmind-api
    env: python
    rootDir: .
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: TEMPERATURE
        value: "0.2"
      - key: MAX_OUTPUT_TOKENS
        value: "2048"
      - key: ALLOWED_ORIGINS
        sync: false
